  <title>🇩🇪 德語 A1 筆記</title>

  </script>
  <style>
    :root {
      --bg: #f5f5f0;
      --card: #ffffff;
      --border: #e2e2d8;
      --text: #1c1c1c;
      --sub: #888;
      --accent: #2a5caa;
      --accent-bg: #eef3fb;
      --tip: #fef3c7;
      --tip-border: #f59e0b;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      padding: 24px 16px 60px;
    }
    .page { max-width: 720px; margin: 0 auto; }

    /* Header */
    .page-header {
      background: #1a2744;
      color: #fff;
      border-radius: var(--radius);
      padding: 24px 28px;
      margin-bottom: 20px;
    }
    .page-header .flag { font-size: 2rem; margin-bottom: 6px; }
    .page-header h1 { font-size: 1.4rem; font-weight: 700; }
    .page-header .meta { margin-top: 6px; font-size: 0.82rem; color: #94a3b8; display: flex; gap: 12px; flex-wrap: wrap; }
    .badge {
      display: inline-block;
      background: #22c55e;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.04em;
    }

    /* Tip */
    .tip {
      background: var(--tip);
      border-left: 3px solid var(--tip-border);
      border-radius: 0 8px 8px 0;
      padding: 10px 14px;
      font-size: 0.875rem;
      margin-bottom: 20px;
    }

    /* Section */
    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .section-title {
      background: #f0f0eb;
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      font-weight: 700;
      font-size: 0.95rem;
    }
    .section-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 20px; }

    /* Block subtitle */
    .subtitle {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th {
      background: #f8f8f5;
      padding: 7px 12px;
      text-align: left;
      font-size: 0.78rem;
      color: var(--sub);
      border-bottom: 1px solid var(--border);
    }
    td { padding: 8px 12px; border-bottom: 1px solid #f2f2ee; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }

    /* List */
    .plain-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .plain-list li {
      padding: 7px 12px;
      background: #f8f8f5;
      border-radius: 6px;
      font-size: 0.875rem;
      border-left: 2px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .plain-list li > span { flex: 1; }
    code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: #eef0f5;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 0.9em;
    }

    /* Groups */
    .groups { display: flex; gap: 12px; flex-wrap: wrap; }
    .group { flex: 1; min-width: 150px; background: #f8f8f5; border-radius: 8px; padding: 12px 14px; }
    .group-label {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--sub); margin-bottom: 8px;
    }
    .group ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .group ul li { font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
    .group ul li > span { flex: 1; }

    /* Cards */
    .cards { display: flex; gap: 12px; flex-wrap: wrap; }
    .card {
      flex: 1; min-width: 120px;
      border-radius: 8px; padding: 14px 12px;
      color: #fff; text-align: center;
    }
    .card .card-label { font-weight: 700; font-size: 0.9rem; }
    .card .card-ex { font-size: 0.8rem; margin-top: 6px; opacity: 0.95; display: flex; align-items: center; justify-content: center; gap: 6px; }

    /* Dialog */
    .dialog { display: flex; flex-direction: column; gap: 8px; }
    .d-line { display: flex; gap: 8px; align-items: flex-start; }
    .d-line.b { flex-direction: row-reverse; }
    .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .a .avatar { background: var(--accent); }
    .b .avatar { background: #7c3aed; }
    .bubble { padding: 8px 12px; border-radius: 10px; font-size: 0.875rem; max-width: 80%; display: flex; align-items: center; gap: 8px; }
    .a .bubble { background: var(--accent-bg); border-radius: 2px 10px 10px 10px; }
    .b .bubble { background: #f3f0ff; border-radius: 10px 2px 10px 10px; }
    .bubble > span { flex: 1; }

    /* Speak button */
    .speak-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      flex-shrink: 0;
      opacity: 0.6;
      transition: opacity 0.15s, transform 0.1s;
    }
    .speak-btn:hover { opacity: 1; }
    .speak-btn:active { transform: scale(0.88); }
    .speak-btn.speaking { opacity: 1; animation: pulse 0.6s infinite alternate; }
    @keyframes pulse { from { opacity: 0.6; } to { opacity: 1; } }

    /* Day picker */
    .day-picker {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .day-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card);
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--text);
      transition: background 0.15s;
    }
    .day-btn.active {
      background: #1a2744;
      color: #fff;
      border-color: #1a2744;
    }

    @media (max-width: 480px) {
      .groups, .cards { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="page" id="page"></div>

<script>
// ── Web Speech API ────────────────────────────────────────────
let activeSpeakBtn = null;

function speakDE(btn) {
  const text = btn.dataset.de;
  if (!text) return;
  if (activeSpeakBtn) activeSpeakBtn.classList.remove('speaking');
  window.speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'de-DE';
  u.rate = 0.75;
  u.onstart = () => { btn.classList.add('speaking'); activeSpeakBtn = btn; };
  u.onend = u.onerror = () => { btn.classList.remove('speaking'); activeSpeakBtn = null; };
  window.speechSynthesis.speak(u);
}

// ── Extract German text from an HTML string ───────────────────
function extractDE(html) {
  let t = html.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
  // Remove （Chinese explanation）
  t = t.replace(/（[^）]*）/g, '').trim();
  // Remove label prefix ending with ： if within first 25 chars
  const ci = t.indexOf('：');
  if (ci > 0 && ci < 25) t = t.slice(ci + 1).trim();
  // Clean up "— 發音..." suffix notes
  t = t.replace(/[—–]\s*發音.*$/i, '').trim();
  return t.replace(/\s+/g, ' ').trim();
}

function hasLatin(str) {
  return /[A-Za-zÄÖÜäöüß]/.test(str.replace(/<[^>]+>/g, ''));
}

function btn(deText) {
  const safe = deText.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  return `<button class="speak-btn" data-de="${safe}" onclick="speakDE(this)" title="德語發音">🔊</button>`;
}

// ── Block renderers ───────────────────────────────────────────
function renderTable(block) {
  let h = '<table><thead><tr>';
  block.headers.forEach(hd => { h += `<th>${hd}</th>`; });
  h += '</tr></thead><tbody>';
  block.rows.forEach(row => {
    h += '<tr>';
    row.forEach(cell => {
      if (hasLatin(String(cell))) {
        const de = extractDE(String(cell));
        h += `<td>${cell} ${btn(de)}</td>`;
      } else {
        h += `<td>${cell}</td>`;
      }
    });
    h += '</tr>';
  });
  h += '</tbody></table>';
  return h;
}

function renderList(block) {
  let h = '<ul class="plain-list">';
  block.items.forEach(item => {
    if (hasLatin(item)) {
      const de = extractDE(item);
      h += `<li><span>${item}</span>${btn(de)}</li>`;
    } else {
      h += `<li><span>${item}</span></li>`;
    }
  });
  h += '</ul>';
  return h;
}

function renderGroups(block) {
  let h = '<div class="groups">';
  block.groups.forEach(group => {
    h += `<div class="group"><div class="group-label">${group.label}</div><ul>`;
    group.items.forEach(item => {
      const de = extractDE(item);
      h += `<li><span>${item}</span>${btn(de)}</li>`;
    });
    h += '</ul></div>';
  });
  h += '</div>';
  return h;
}

function renderCards(block) {
  let h = '<div class="cards">';
  block.items.forEach(card => {
    const de = extractDE(card.example);
    h += `<div class="card" style="background:${card.color}">
      <div class="card-label">${card.label}</div>
      <div class="card-ex"><span>${card.example}</span>${btn(de)}</div>
    </div>`;
  });
  h += '</div>';
  return h;
}

function renderDialog(block) {
  let h = '<div class="dialog">';
  block.lines.forEach(line => {
    const cls = line.speaker === 'A' ? 'a' : 'b';
    h += `<div class="d-line ${cls}">
      <div class="avatar">${line.speaker}</div>
      <div class="bubble"><span>${line.text}</span>${btn(line.text)}</div>
    </div>`;
  });
  h += '</div>';
  return h;
}

function renderBlock(block) {
  let h = '<div>';
  if (block.subtitle) h += `<div class="subtitle">${block.subtitle}</div>`;
  if      (block.type === 'table')  h += renderTable(block);
  else if (block.type === 'list')   h += renderList(block);
  else if (block.type === 'groups') h += renderGroups(block);
  else if (block.type === 'cards')  h += renderCards(block);
  else if (block.type === 'dialog') h += renderDialog(block);
  h += '</div>';
  return h;
}

// ── Render one note ───────────────────────────────────────────
function renderNote(note) {
  let h = '';
  h += `<div class="page-header">
    <div class="flag">🇩🇪</div>
    <h1>${note.title}</h1>
    <div class="meta">
      <span><span class="badge">${note.level}</span></span>
      <span>${note.date}</span>
      <span>Deutsche Lernnotizen</span>
    </div>
  </div>`;

  if (note.tip) {
    h += `<div class="tip">💡 ${note.tip}</div>`;
  }

  note.sections.forEach(sec => {
    h += `<div class="section">
      <div class="section-title">${sec.icon} ${sec.title}</div>
      <div class="section-body">`;
    sec.blocks.forEach(block => { h += renderBlock(block); });
    h += `</div></div>`;
  });

  return h;
}

// ── Main render ───────────────────────────────────────────────
function render() {
  const notes = window.DE_NOTES || [];
  if (!notes.length) {
    document.getElementById('page').innerHTML = '<p style="padding:40px;text-align:center;color:#888">找不到筆記資料</p>';
    return;
  }

  const page = document.getElementById('page');

  // Day selector (if multiple notes)
  let currentIdx = 0;

  function showNote(idx) {
    currentIdx = idx;
    let h = '';

    if (notes.length > 1) {
      h += '<div class="day-picker">';
      notes.forEach((n, i) => {
        const active = i === idx ? ' active' : '';
        h += `<button class="day-btn${active}" onclick="showNote(${i})">${n.date}</button>`;
      });
      h += '</div>';
    }

    h += renderNote(notes[idx]);
    page.innerHTML = h;
  }

  // Expose so onclick works after re-render
  window.showNote = showNote;
  showNote(0);
}

document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
