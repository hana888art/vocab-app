<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="單字卡">
<meta name="theme-color" content="#1c1c2e">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>動詞變化複習</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1c1c2e;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
  }

  /* ── 頂部搜尋 ── */
  .top-bar {
    position: sticky;
    top: 0;
    background: #1c1c2e;
    padding: 16px 16px 10px;
    z-index: 100;
    border-bottom: 1px solid #2e2e4a;
  }

  .search-input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 12px;
    border: none;
    background: #f5f5f5;
    color: #333;
    font-size: 15px;
    outline: none;
  }

  .search-input::placeholder { color: #999; }

  /* ── 語言篩選標籤 ── */
  .filter-bar {
    display: flex;
    gap: 8px;
    padding: 10px 16px 0;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    background: #2e2e4a;
    color: #aaa;
    transition: all 0.2s;
  }

  .filter-btn.active { color: #fff; }
  .filter-btn[data-lang="ALL"].active  { background: #555; }
  .filter-btn[data-lang="ES"].active   { background: #e05c5c; }
  .filter-btn[data-lang="DE"].active   { background: #e09a2a; }
  .filter-btn[data-lang="EN"].active   { background: #4a9eca; }

  .level-btn {
    padding: 5px 12px;
    border-radius: 20px;
    border: none;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    background: #2e2e4a;
    color: #aaa;
    transition: all 0.2s;
  }
  .level-btn.active { color: #fff; }
  .level-btn[data-level="ALL"].active  { background: #555; }
  .level-btn[data-level="A1"].active   { background: #3a8f6a; }
  .level-btn[data-level="A2"].active   { background: #2e7d5c; }
  .level-btn[data-level="B1"].active   { background: #5a6ea8; }
  .level-btn[data-level="B2"].active   { background: #4a5c9a; }
  .level-btn[data-level="C1"].active   { background: #8a4a9a; }

  .filter-row {
    display: flex;
    gap: 6px;
    padding: 6px 16px 0;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-divider {
    width: 1px;
    height: 18px;
    background: #3a3a5c;
    margin: 0 2px;
  }

  .pos-filter {
    padding: 4px 11px; border-radius: 20px; border: none;
    font-size: 12px; font-weight: 600; cursor: pointer;
    background: #2e2e4a; color: #888; transition: all 0.2s;
  }
  .pos-filter.active { background: #3a3a6a; color: #c0c0ff; }

  /* ── 卡片列表 ── */
  .card-list {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 680px;
    margin: 0 auto;
  }

  .card {
    background: #252540;
    border-radius: 16px;
    padding: 16px;
  }

  .card-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #fff;
  }

  .tag-ES { background: #e05c5c; }
  .tag-DE { background: #e09a2a; }
  .tag-EN { background: #4a9eca; }

  .card-verb {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .speak-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }

  .speak-btn:hover { background: rgba(255,255,255,0.1); }
  .speak-btn:active { transform: scale(0.88); }
  .speak-btn.speaking { animation: pulse 0.6s ease infinite alternate; }

  @keyframes pulse {
    from { opacity: 1; }
    to   { opacity: 0.45; }
  }

  .speak-btn svg { width: 20px; height: 20px; }

  /* ── 時態格子 ── */
  .tenses-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }

  .tense-box {
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    border: none;
    text-align: left;
  }

  .tense-box:hover { opacity: 0.85; transform: scale(0.98); }
  .tense-box:active { transform: scale(0.95); }

  .tense-pres { background: #c8e6fa; color: #1a4a6b; }
  .tense-past { background: #fde8c0; color: #6b3d00; }
  .tense-part { background: #c8f0d8; color: #1a5c30; }
  .tense-subj { background: #e8d0f8; color: #4a1a6b; }
  .tense-imp  { background: #ffd6d6; color: #6b1a1a; }
  .tense-fut  { background: #d6f0ff; color: #004a6b; }
  .tense-subjimp { background: #ffe8d6; color: #6b3000; }

  .tense-label { font-size: 11px; font-weight: 700; margin-bottom: 2px; opacity: 0.7; }

  .card-divider { border: none; border-top: 1px solid #3a3a5c; margin-bottom: 10px; }

  .card-example {
    font-style: italic;
    font-size: 14px;
    color: #b0b0c8;
    margin-bottom: 4px;
  }

  .card-meaning { font-size: 13px; color: #888; }

  /* ── 彈跳視窗 ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: #252540;
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    max-width: 360px;
    animation: popIn 0.2s ease;
  }

  @keyframes popIn {
    from { transform: scale(0.9); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .modal-title {
    text-align: center;
    font-size: 20px;
    font-weight: 700;
    color: #f07070;
    margin-bottom: 20px;
  }

  .persons-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .person-item { }
  .person-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .person-form  { font-size: 16px; font-weight: 600; color: #fff; }

  .modal-close {
    display: block;
    width: 100%;
    padding: 13px;
    border-radius: 14px;
    border: none;
    background: #f07070;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }

  .no-results {
    text-align: center;
    color: #666;
    padding: 40px 0;
    font-size: 15px;
  }

  /* ── 底部導航 ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #1c1c2e;
    border-top: 1px solid #2e2e4a;
    display: flex;
    z-index: 150;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .nav-btn {
    flex: 1; background: none; border: none;
    padding: 10px 0 8px;
    color: #666; cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    font-size: 10px; font-weight: 600;
    transition: color 0.2s;
  }
  .nav-btn.active { color: #f07070; }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-badge {
    position: absolute; top: 6px; right: calc(50% - 18px);
    background: #f07070; color: #fff;
    font-size: 9px; font-weight: 700;
    border-radius: 8px; padding: 1px 5px;
    min-width: 16px; text-align: center;
  }

  /* ── 卡片列表底部空間 ── */
  .card-list { padding-bottom: 90px; }

  /* ── 複習模式 ── */
  .review-view {
    padding: 16px 16px 90px;
    max-width: 480px; margin: 0 auto;
  }
  .review-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 10px;
    font-size: 13px; color: #888;
  }
  .review-progress-track {
    height: 3px; background: #2e2e4a;
    border-radius: 2px; margin-bottom: 20px; overflow: hidden;
  }
  .review-card-wrap {
    background: #252540; border-radius: 20px;
    min-height: 260px; padding: 28px 24px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; cursor: pointer;
    margin-bottom: 16px;
    transition: transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .review-card-wrap:active { transform: scale(0.98); }
  .review-verb {
    font-size: 38px; font-weight: 700; color: #fff;
    margin: 14px 0 6px;
    display: flex; align-items: center; gap: 10px;
  }
  .review-hint { color: #444; font-size: 13px; margin-top: 16px; }
  .review-meaning { font-size: 26px; font-weight: 600; color: #f0c070; margin-bottom: 10px; }
  .review-ex {
    font-size: 13px; color: #b0b0c8; font-style: italic;
    display: flex; align-items: flex-start; gap: 6px;
    margin-bottom: 6px;
  }
  .review-ex-zh { font-size: 12px; color: #666; margin-bottom: 12px; }
  .review-conj-hint { font-size: 12px; color: #555; }
  .review-rating {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  .rating-btn {
    padding: 16px 8px; border-radius: 14px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
    line-height: 1.4;
  }
  .rating-btn:active { transform: scale(0.95); }
  .rating-btn.bad  { background: #f07070; color: #fff; }
  .rating-btn.ok   { background: #f0c070; color: #333; }
  .rating-btn.good { background: #70c08a; color: #fff; }
  .review-empty {
    text-align: center; padding: 60px 20px; color: #666;
  }
  .review-empty-icon { font-size: 52px; margin-bottom: 14px; }
  .review-empty h3 { color: #aaa; margin-bottom: 8px; font-size: 18px; }
  .review-action-btn {
    margin-top: 20px; padding: 12px 28px;
    background: #f07070; color: #fff;
    border: none; border-radius: 14px;
    font-size: 15px; font-weight: 600; cursor: pointer;
  }

  /* ── 統計視圖 ── */
  .stats-view {
    padding: 16px 16px 90px;
    max-width: 480px; margin: 0 auto;
  }
  .stats-section {
    background: #252540; border-radius: 16px;
    padding: 18px; margin-bottom: 14px;
  }
  .stats-title {
    font-size: 12px; font-weight: 700; color: #888;
    text-transform: uppercase; letter-spacing: 0.6px;
    margin-bottom: 14px;
  }
  .stats-numbers {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 10px; margin-bottom: 4px;
  }
  .stat-box { text-align: center; }
  .stat-num { font-size: 30px; font-weight: 700; color: #fff; }
  .stat-label { font-size: 11px; color: #888; margin-top: 2px; }
  .mastery-legend {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-top: 14px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 7px;
    font-size: 12px;
  }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .pbar-row { margin-bottom: 12px; }
  .pbar-label {
    display: flex; justify-content: space-between;
    font-size: 12px; color: #888; margin-bottom: 4px;
  }
  .pbar-track {
    height: 8px; background: #1c1c2e;
    border-radius: 4px; overflow: hidden;
  }
  .pbar-fill { height: 100%; border-radius: 4px; transition: width 0.7s ease; }
  .gantt-row { margin-bottom: 14px; }
  .gantt-label {
    display: flex; justify-content: space-between;
    font-size: 12px; color: #888; margin-bottom: 5px;
  }
  .gantt-track {
    height: 16px; background: #1c1c2e; border-radius: 8px;
    position: relative; overflow: visible;
  }
  .gantt-fill {
    height: 100%; border-radius: 8px;
    transition: width 0.8s ease;
    position: absolute; left: 0; top: 0;
  }
  .gantt-target {
    position: absolute; top: -4px; width: 2px; height: 24px;
    background: #f07070; border-radius: 1px;
  }

  /* ── 掌握度徽章 ── */
  .mastery-dot {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; margin-right: 3px; vertical-align: middle;
  }

  /* ── 詞性標籤 ── */
  .pos-tag {
    display: inline-block; padding: 2px 8px; border-radius: 8px;
    font-size: 11px; font-weight: 700; margin-left: 6px;
    vertical-align: middle;
  }
  .pos-v    { background: #2e3a5a; color: #7ab3f0; }
  .pos-n    { background: #3a2e5a; color: #b07af0; }
  .pos-adj  { background: #2e5a3a; color: #7af0a0; }
  .pos-adv  { background: #5a4a2e; color: #f0c070; }
  .pos-phrase { background: #5a2e3a; color: #f07070; }
  .pos-news { background: #2e4a3a; color: #70f0c0; }

  /* ── 非動詞卡片（無變化表格） ── */
  .word-card-simple .card-word {
    font-size: 22px; font-weight: 700; color: #fff;
    margin-bottom: 4px;
  }
  .phrase-examples {
    background: #1c1c2e; border-radius: 8px;
    padding: 10px 12px; margin: 8px 0;
    font-size: 13px; color: #b0b0c8;
  }
  .phrase-line { margin-bottom: 4px; display: flex; align-items: flex-start; gap: 6px; }
  .phrase-line:last-child { margin-bottom: 0; }

  /* ── 新知卡片 ── */
  .news-card {
    background: linear-gradient(135deg, #1e3040, #1c2e40);
    border: 1px solid #2e4a5a;
  }
  .news-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px;
  }
  .news-category {
    font-size: 11px; font-weight: 700; color: #70f0c0;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .news-date { font-size: 11px; color: #555; margin-left: auto; }
  .news-title {
    font-size: 16px; font-weight: 700; color: #fff;
    line-height: 1.4; margin-bottom: 8px;
  }
  .news-body {
    font-size: 13px; color: #b0b0c8; line-height: 1.6;
  }
  .news-vocab {
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid #2e3a4a;
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .news-word-chip {
    background: #252540; border-radius: 8px;
    padding: 4px 10px; font-size: 12px;
    cursor: pointer; transition: background 0.2s;
  }
  .news-word-chip:hover { background: #2e2e60; }
  .news-word-chip .chip-word { color: #f0c070; font-weight: 600; }
  .news-word-chip .chip-meaning { color: #888; font-size: 11px; }

  /* ── 例句發音按鈕 ── */
  .example-row {
    display: flex; align-items: flex-start; gap: 6px;
  }
  .example-row span { flex: 1; }

  /* ── 例句單字點擊 ── */
  .w-chip {
    cursor: pointer;
    border-radius: 3px;
    padding: 0 2px;
    transition: background 0.15s, color 0.15s;
    display: inline;
  }
  .w-chip:active { background: rgba(160,130,255,0.25); color: #d0b0ff; }

  /* ── 單字查詢彈窗 ── */
  #wordModal {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.7);
    display: none; align-items: flex-end; justify-content: center;
  }
  #wordModal.open { display: flex; }
  #wordModal .wm-panel {
    background: #1e1e32;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width: 100%; max-width: 680px;
    max-height: 80vh; overflow-y: auto;
  }
  .wm-word {
    font-size: 26px; font-weight: 700; color: #f0e8ff;
    display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
  }
  .wm-reading { font-size: 13px; color: #888; margin-bottom: 12px; }
  .wm-meaning { font-size: 18px; color: #c8e8ff; font-weight: 600; margin-bottom: 8px; }
  .wm-pos { display:inline-block; font-size:11px; padding:2px 8px; border-radius:8px; margin-bottom:10px; }
  .wm-section-title { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin: 14px 0 6px; }
  .wm-example { font-size: 13px; color: #a0a0c0; line-height: 1.6; padding: 8px 12px; background: #16162a; border-radius: 8px; }
  .wm-example-zh { font-size: 12px; color: #666; margin-top: 3px; }
  .wm-phrases { display: flex; flex-direction: column; gap: 6px; }
  .wm-phrase-row { font-size: 13px; color: #c0b080; padding: 6px 10px; background: #1a1a2a; border-radius: 8px; }
  .wm-phrase-meaning { color: #888; font-size: 12px; }
  .wm-not-found { font-size: 13px; color: #888; padding: 12px; background: #16162a; border-radius: 8px; }
  .wm-close { width: 100%; margin-top: 16px; padding: 12px; border: none; border-radius: 12px; background: #2e2e4a; color: #a0a0c0; font-size: 15px; cursor: pointer; }
  .wm-add-btn { display:inline-block; margin-top:10px; padding:8px 16px; background:#3a2e5a; color:#c0a0ff; border:none; border-radius:10px; font-size:13px; cursor:pointer; }

  /* ── 時事分頁 ── */
  .news-view { padding: 16px 16px 90px; max-width: 680px; margin: 0 auto; }
</style>
</head>
<body>

<div class="top-bar">
  <input class="search-input" type="text" id="searchInput" placeholder="搜尋單字、時態或意思...">
  <div class="filter-row">
    <button class="filter-btn active" data-lang="ALL">全部</button>
    <button class="filter-btn" data-lang="ES">西文</button>
    <button class="filter-btn" data-lang="DE">德文</button>
    <button class="filter-btn" data-lang="EN">英文</button>
    <div class="filter-divider"></div>
    <button class="level-btn active" data-level="ALL">所有級</button>
    <button class="level-btn" data-level="A1">A1</button>
    <button class="level-btn" data-level="A2">A2</button>
    <button class="level-btn" data-level="B1">B1</button>
    <button class="level-btn" data-level="B2">B2</button>
    <button class="level-btn" data-level="C1">C1</button>
  </div>
  <div class="filter-row" id="posFilterRow">
    <button class="pos-filter active" data-pos="ALL">所有詞性</button>
    <button class="pos-filter" data-pos="v">動詞</button>
    <button class="pos-filter" data-pos="n">名詞</button>
    <button class="pos-filter" data-pos="adj">形容詞</button>
    <button class="pos-filter" data-pos="adv">副詞</button>
    <button class="pos-filter" data-pos="phrase">片語</button>
  </div>
</div>

<!-- 單字卡視圖 -->
<div id="cardsView">
  <div class="card-list" id="cardList"></div>
</div>

<!-- 複習視圖 -->
<div id="reviewView" style="display:none">
  <div class="review-view" id="reviewContainer"></div>
</div>

<!-- 統計視圖 -->
<div id="statsView" style="display:none">
  <div class="stats-view" id="statsContainer"></div>
</div>

<!-- 彈跳視窗 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle" style="display:flex;align-items:center;justify-content:center;gap:10px"></div>
    <div class="persons-grid" id="personsGrid"></div>
    <button class="modal-close" onclick="closeModal()">關閉</button>
  </div>
</div>

<!-- 單字查詢彈窗 -->
<div id="wordModal">
  <div class="wm-panel">
    <div id="wmContent"></div>
    <button class="wm-close" onclick="closeWordModal()">關閉</button>
  </div>
</div>

<!-- 時事視圖 -->
<div id="newsView" style="display:none">
  <div class="news-view" id="newsContainer"></div>
</div>

<!-- 底部導航 -->
<nav class="bottom-nav">
  <button class="nav-btn active" data-view="cards" onclick="switchView('cards')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="5" rx="2"/><rect x="3" y="12" width="18" height="5" rx="2"/><rect x="3" y="20" width="18" height="5" rx="2" opacity="0.4"/></svg>

// 艾賓浩斯遺忘曲線 SRS（SM-2 簡化版）
// ════════════════════════════════════════════
const SRS_KEY = 'vocab_srs_v1';

function srsLoad() {
  try { return JSON.parse(localStorage.getItem(SRS_KEY)) || {words:{},lastStudy:null,todayReviewed:[]}; }
  catch { return {words:{},lastStudy:null,todayReviewed:[]}; }
}
function srsSave(d) { localStorage.setItem(SRS_KEY, JSON.stringify(d)); }
function srsGet(verb) { return srsLoad().words[verb] || {interval:0,ef:2.5,reps:0,state:0,nextReview:null}; }

function srsRate(verb, quality) {
  // quality: 0=不知道, 1=模糊, 2=知道
  const data = srsLoad();
  let w = data.words[verb] || {interval:0,ef:2.5,reps:0,state:0};
  if (quality === 0) { w.interval=1; w.reps=0; }
  else {
    if (w.reps===0) w.interval=1;
    else if (w.reps===1) w.interval=6;
    else w.interval=Math.round(w.interval*w.ef);
    w.ef = Math.max(1.3, w.ef + 0.1 - (2-quality)*(0.08+(2-quality)*0.02));
    w.reps++;
  }
  w.state = w.reps===0 ? 0 : w.interval<=3 ? 1 : w.interval<=14 ? 2 : 3;
  const next = new Date(); next.setDate(next.getDate() + Math.max(1,w.interval));
  w.nextReview = next.toISOString().split('T')[0];
  data.words[verb] = w;
  const today = new Date().toISOString().split('T')[0];
  if (!data.todayReviewed) data.todayReviewed=[];
  if (!data.todayReviewed.includes(verb)) data.todayReviewed.push(verb);
  if (data.lastStudy !== today) {
    data.lastStudy = today; data.todayReviewed = [verb];
  }
  srsSave(data);
  return w;
}

function getReviewQueue() {
  const today = new Date().toISOString().split('T')[0];
  const data = srsLoad();
  const reviewed = new Set(data.todayReviewed||[]);
  const dueWords  = WORDS.filter(w => { const p=data.words[w.verb]; return p && !reviewed.has(w.verb) && p.nextReview && p.nextReview<=today; });
  const newWords  = WORDS.filter(w => !data.words[w.verb] && !reviewed.has(w.verb));
  return [...dueWords, ...newWords.slice(0,15)];
}

function getDueCount() {
  const today = new Date().toISOString().split('T')[0];
  const data = srsLoad();
  const reviewed = new Set(data.todayReviewed||[]);
  return WORDS.filter(w => { const p=data.words[w.verb]; return !p || (!reviewed.has(w.verb) && (!p.nextReview || p.nextReview<=today)); }).length;
}

function updateBadge() {
  const n = Math.min(getDueCount(), 99);
  const badge = document.getElementById('reviewBadge');
  if (n > 0) { badge.textContent = n; badge.style.display=''; }
  else badge.style.display='none';
}

// 複習模式
// ════════════════════════════════════════════
let reviewQueue=[], reviewIndex=0, reviewFlipped=false;

function startReview() {
  reviewQueue = getReviewQueue();
  reviewIndex = 0; reviewFlipped = false;
  renderReview();
}

function renderReview() {
  const container = document.getElementById('reviewContainer');
  const data = srsLoad();
  const todayCount = (data.todayReviewed||[]).length;

  if (!reviewQueue.length || reviewIndex >= reviewQueue.length) {
    container.innerHTML = `
      <div class="review-empty">
        <div class="review-empty-icon">${reviewQueue.length===0?'🎉':'✅'}</div>
        <h3>${reviewQueue.length===0?'今天的複習完成了！':'本次已全部複習！'}</h3>
        <p style="color:#888">今日已複習 <b style="color:#fff">${todayCount}</b> 個單字</p>
        <button class="review-action-btn" onclick="forceReviewAll()">複習全部單字</button>
      </div>`;
    return;
  }

  const w = reviewQueue[reviewIndex];
  const prog = srsGet(w.verb);
  const stateColor = ['#555','#e09a2a','#4a9eca','#70c08a'][prog.state];
  const stateLabel = ['未開始','學習中','熟悉','精通'][prog.state];
  const pct = ((reviewIndex/reviewQueue.length)*100).toFixed(1);

  const SPEAK_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:#888;width:18px;height:18px"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`;

  container.innerHTML = `
    <div class="review-header">
      <span>${reviewIndex+1} / ${reviewQueue.length}</span>
      <span style="color:${stateColor};font-weight:700">${stateLabel}</span>
      <span>${w.lang} · ${w.level}</span>
    </div>
    <div class="review-progress-track">
      <div style="width:${pct}%;background:#f07070;height:100%;border-radius:2px;transition:width 0.3s"></div>
    </div>

    <div class="review-card-wrap" id="reviewCardWrap" onclick="flipCard()">
      <div id="reviewFront">
        <span class="card-tag tag-${w.lang}">${w.lang}(${w.level})</span>
        <div class="review-verb">
          ${w.verb}
          <button class="speak-btn" onclick="speakWord(event,${JSON.stringify(w.verb)},${JSON.stringify(w.lang)})" style="display:inline-flex">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:#aaa;width:24px;height:24px"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          </button>
        </div>
        <div class="review-hint">點此翻牌查看答案 ↓</div>
      </div>
      <div id="reviewBack" style="display:none">
        <div class="review-meaning">${w.meaning}</div>
        <div class="review-ex">
          <span>${w.example}</span>
          <button class="speak-btn" onclick="speakWord(event,${JSON.stringify(w.example)},${JSON.stringify(w.lang)})" style="display:inline-flex;flex-shrink:0">${SPEAK_SVG}</button>
        </div>
        ${w.exampleZh ? `<div class="review-ex-zh">${w.exampleZh}</div>` : ''}
        <div class="review-conj-hint">
          現在式: ${(w.conj.pres||[])[0]||'-'} &nbsp;|&nbsp; 過去式: ${(w.conj.past||[])[0]||'-'}
          ${w.conj.imp&&w.conj.imp[0]!=='-' ? ` &nbsp;|&nbsp; 未完成: ${w.conj.imp[0]}` : ''}
        </div>
      </div>
    </div>

    <div class="review-rating" id="reviewRating" style="display:none">
      <button class="rating-btn bad"  onclick="rateWord(0)">✗<br><small>不知道</small></button>
      <button class="rating-btn ok"   onclick="rateWord(1)">△<br><small>模糊</small></button>
      <button class="rating-btn good" onclick="rateWord(2)">✓<br><small>知道</small></button>
    </div>`;
}

function flipCard() {
  if (reviewFlipped) return;
  reviewFlipped = true;
  document.getElementById('reviewFront').style.display = 'none';
  document.getElementById('reviewBack').style.display  = 'block';
  document.getElementById('reviewRating').style.display = 'grid';
  document.getElementById('reviewCardWrap').onclick = null;
  document.getElementById('reviewCardWrap').style.cursor = 'default';
}

function rateWord(quality) {
  const w = reviewQueue[reviewIndex];
  srsRate(w.verb, quality);
  reviewIndex++; reviewFlipped = false;
  renderReview();
  updateBadge();
}

function forceReviewAll() {
  const data = srsLoad(); data.todayReviewed = []; srsSave(data);
  reviewQueue = WORDS.slice();
  reviewIndex = 0; reviewFlipped = false;
  renderReview();
}

          </div>

        共 ${total} 個 · 已熟悉 ${cnt[2]+cnt[3]} 個 · 精通 ${cnt[3]} 個
      </div>
    </div>`;

  // 繪製環形圖
  requestAnimationFrame(() => {
    const canvas = document.getElementById('masteryChart');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const cx=150, cy=90, r=70, ir=42;
    const colors=['#555','#e09a2a','#4a9eca','#70c08a'];
    let angle = -Math.PI/2;
    ctx.clearRect(0,0,300,180);
    cnt.forEach((c,i) => {
      if (!c) return;
      const slice = (c/total)*Math.PI*2;
      ctx.beginPath(); ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,r,angle,angle+slice);
      ctx.closePath(); ctx.fillStyle=colors[i]; ctx.fill();
      angle += slice;
    });
    ctx.beginPath(); ctx.arc(cx,cy,ir,0,Math.PI*2);
    ctx.fillStyle='#252540'; ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 18px -apple-system,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(famPct+'%', cx, cy-9);
    ctx.fillStyle='#888'; ctx.font='11px -apple-system,sans-serif';
    ctx.fillText('已熟悉', cx, cy+10);
  });
}

// ════════════════════════════════════════════
// 例句單字點擊查詢
// ════════════════════════════════════════════
function chipify(text, lang) {
  // Split into tokens preserving spaces/punctuation groups
  return text.replace(/([^\s.,!?¿¡;:()"']+)/g, (word) => {
    const clean = word.replace(/[.,!?¿¡;:()"']/g,'').toLowerCase();
    if (!clean) return word;
    const encoded = word.replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    const cleanEnc = clean.replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    return `<span class="w-chip" onclick="lookupWord('${cleanEnc}','${lang}')">${encoded}</span>`;
  });
}

function lookupWord(clean, lang) {
  const POS_COLORS = {v:'#a07040',n:'#406090',adj:'#507060',adv:'#705090',phrase:'#906060'};
  const POS_ZH = {v:'動詞',n:'名詞',adj:'形容詞',adv:'副詞',phrase:'片語'};

  // Search WORDS (case-insensitive, also check conjugation forms)
  // lang='ALL' means search across all languages (used by news chips)
  const found = WORDS.find(w => {
    if (w.verb.toLowerCase() === clean) return true;
    if (lang !== 'ALL' && w.lang !== lang) return false;
    return Object.values(w.conj||{}).flat().some(f => f && f.toLowerCase()===clean);
  });

  let html = '';
  if (found) {
    const pos = found.pos||'v';
    const color = POS_COLORS[pos]||'#555';
    const posZh = POS_ZH[pos]||pos;
    html = `
      <div class="wm-word">
        ${found.verb}
        <button class="speak-btn" onclick="speakWord(event,${JSON.stringify(found.verb)},${JSON.stringify(found.lang)})" style="flex-shrink:0">${SPEAK_ICON(22,'#a090d0')}</button>
      </div>
      <div class="wm-reading">${found.lang} · ${found.level}</div>
      <span class="wm-pos" style="background:${color}22;color:${color}">${posZh}</span>
      ${found.region ? `<span class="wm-pos" style="background:#3a3a2e22;color:#c0c070;margin-left:4px">${found.region==='LAT'?'拉美':'西班牙'}</span>` : ''}
      <div class="wm-meaning">${found.meaning}</div>
      ${found.inflect ? `<div style="font-size:12px;color:#888;margin-bottom:8px">${found.inflect}</div>` : ''}
      <div class="wm-section-title">例句</div>
      <div class="wm-example">
        ${found.example}
        <button class="speak-btn" onclick="speakWord(event,${JSON.stringify(found.example)},${JSON.stringify(found.lang)})" style="margin-left:4px">${SPEAK_ICON_SM('#666')}</button>
      </div>
      ${found.exampleZh ? `<div class="wm-example-zh">${found.exampleZh}</div>` : ''}
      ${found.phrases && found.phrases.length ? `
        <div class="wm-section-title">常用片語</div>
        <div class="wm-phrases">
          ${found.phrases.map(p=>`
            <div class="wm-phrase-row">
              <b>${p.text}</b>
              <button class="speak-btn" onclick="speakWord(event,${JSON.stringify(p.text)},${JSON.stringify(found.lang)})" style="margin-left:4px">${SPEAK_ICON_SM('#888')}</button>
              <br><span class="wm-phrase-meaning">${p.meaning}</span>
            </div>`).join('')}
        </div>` : ''}`;
  } else {
    html = `
      <div class="wm-word">
        ${clean}
        <button class="speak-btn" onclick="speakWord(event,${JSON.stringify(clean)},${JSON.stringify(lang)})" style="flex-shrink:0">${SPEAK_ICON(22,'#a090d0')}</button>
      </div>
      <div class="wm-not-found">此單字尚未收錄在單字庫中。<br>點擊發音按鈕可以聆聽讀音。</div>`;
  }
  document.getElementById('wmContent').innerHTML = html;
  document.getElementById('wordModal').classList.add('open');
}

  document.getElementById('wordModal').classList.remove('open');
}

  document.getElementById('wordModal').addEventListener('click', function(e){
    if (e.target===this) closeWordModal();
  });
});

// ════════════════════════════════════════════
// 發音
// ════════════════════════════════════════════
const LANG_CODE = { ES:"es-ES", DE:"de-DE", EN:"en-US" };
const VOICE_PREFS = {
  DE: ["Anna","Petra","Markus","de-DE-Neural","de-DE"],
  ES: ["Monica","Jorge","Mónica","es-ES-Neural","Paulina","es-ES","es-MX"],
  EN: ["Samantha","Daniel","en-US-Neural","en-US","en-GB"],
};
let _voices=[];
function _loadVoices() { _voices=speechSynthesis.getVoices(); }
function _pickVoice(lang) {
  if (!_voices.length) _loadVoices();
  for (const pref of (VOICE_PREFS[lang]||[])) {
    const v = _voices.find(v=>v.name.includes(pref)||v.lang===pref||v.lang.startsWith(pref));
    if (v) return v;
  }
  const base = (LANG_CODE[lang]||"es-ES").split("-")[0];
  const all  = _voices.filter(v=>v.lang.startsWith(base));
  return all.find(v=>/enhanced|premium|neural/i.test(v.name)) || all[0] || null;
}
function speakWord(event, text, lang) {
  event.stopPropagation();
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const btn = event.currentTarget;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang  = LANG_CODE[lang]||"es-ES";
  utter.rate  = lang==="DE" ? 0.82 : 0.88;
  utter.pitch = 1.0;
  const voice = _pickVoice(lang); if (voice) utter.voice=voice;
  btn.classList.add("speaking");
  utter.onend = utter.onerror = ()=>btn.classList.remove("speaking");
  speechSynthesis.speak(utter);
}
